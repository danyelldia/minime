name: Build MiniMe APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Instaleaza Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Genereaza scheletul Android (o singura data, nu tinem android/ in git)
        run: |
          flutter create --platforms=android --org com.danyell.minime --project-name minime tmp_scaffold
          cp -r tmp_scaffold/android ./android
          rm -rf tmp_scaffold

      - name: Fixeaza crash WorkManager (versiuni androidx.work conflictuale intre plugin-uri)
        run: |
          python3 -c '
          import os
          groovy = "android/build.gradle"
          kts = "android/build.gradle.kts"
          if os.path.exists(kts):
              path = kts
              addition = """

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force("androidx.work:work-runtime:2.9.0")
                      force("androidx.work:work-runtime-ktx:2.9.0")
                  }
              }
          }
          """
          else:
              path = groovy
              addition = """

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force "androidx.work:work-runtime:2.9.0"
                      force "androidx.work:work-runtime-ktx:2.9.0"
                  }
              }
          }
          """
          with open(path, "a") as f:
              f.write(addition)
          print("patched:", path)
          '

      - name: Activeaza core library desugaring (necesar pentru flutter_local_notifications)
        run: |
          python3 -c '
          import os
          groovy = "android/app/build.gradle"
          kts = "android/app/build.gradle.kts"
          if os.path.exists(kts):
              path = kts
              addition = """

          android {
              compileSdk = 36
              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
              }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                  }
              }
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          """
          else:
              path = groovy
              addition = """

          android {
              compileSdk 36
              compileOptions {
                  coreLibraryDesugaringEnabled true
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          dependencies {
              coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
          }
          """
          with open(path, "a") as f:
              f.write(addition)
          print("patched:", path)
          '

      - name: Adauga widget-ul de home screen si permisiunile de locatie
        run: |
          python3 -c '
          import glob
          import os
          import re
          import shutil

          # 1) find the generated MainActivity.kt to discover the real
          #    application package (org + project name), so the widget
          #    provider ends up in the same package automatically.
          matches = glob.glob("android/app/src/main/kotlin/**/MainActivity.kt", recursive=True)
          assert matches, "MainActivity.kt not found - cannot place widget provider"
          main_activity = matches[0]
          pkg_dir = os.path.dirname(main_activity)
          pkg_name = pkg_dir.split("kotlin/", 1)[1].replace("/", ".")
          print("detected package:", pkg_name)

          # 2) render the widget provider Kotlin file into that package
          template = open("native/widget/TodayWidgetProvider.kt.template").read()
          rendered = template.replace("__PACKAGE__", pkg_name)
          with open(os.path.join(pkg_dir, "TodayWidgetProvider.kt"), "w") as f:
              f.write(rendered)

          # 2b) render the native TTS-alarm receiver + scheduler + persistent
          #     store + boot receiver (used for spoken reminders that work
          #     even when the app is killed, and that survive a reboot).
          for name in ["TtsAlarmScheduler", "TtsAlarmReceiver", "TtsAlarmStore", "TtsAlarmBootReceiver"]:
              template = open(f"native/tts_alarm/{name}.kt.template").read()
              rendered = template.replace("__PACKAGE__", pkg_name)
              with open(os.path.join(pkg_dir, f"{name}.kt"), "w") as f:
                  f.write(rendered)

          # 2c) patch MainActivity.kt to expose a MethodChannel that Dart
          #     uses to schedule/cancel the native TTS alarms.
          main_activity_content = open(main_activity).read()
          if "TTS_ALARM_CHANNEL" not in main_activity_content:
              main_activity_content = re.sub(
                  r"import io\.flutter\.embedding\.android\.FlutterActivity",
                  "import io.flutter.embedding.android.FlutterActivity\n"
                  "import io.flutter.embedding.engine.FlutterEngine\n"
                  "import io.flutter.plugin.common.MethodChannel",
                  main_activity_content,
              )
              new_class_body = (
                  "class MainActivity: FlutterActivity() {\n"
                  "    private val TTS_ALARM_CHANNEL = \"com.danyell.minime/tts_alarm\"\n"
                  "\n"
                  "    override fun configureFlutterEngine(flutterEngine: FlutterEngine) {\n"
                  "        super.configureFlutterEngine(flutterEngine)\n"
                  "        MethodChannel(flutterEngine.dartExecutor.binaryMessenger, TTS_ALARM_CHANNEL).setMethodCallHandler { call, result ->\n"
                  "            when (call.method) {\n"
                  "                \"scheduleTtsAlarm\" -> {\n"
                  "                    val id = (call.argument<Any>(\"id\") as? Number)?.toInt() ?: 0\n"
                  "                    val title = call.argument<String>(\"title\") ?: \"\"\n"
                  "                    val triggerAtMillis = (call.argument<Any>(\"triggerAtMillis\") as? Number)?.toLong() ?: 0L\n"
                  "                    TtsAlarmScheduler.schedule(applicationContext, id, title, triggerAtMillis)\n"
                  "                    result.success(null)\n"
                  "                }\n"
                  "                \"cancelTtsAlarm\" -> {\n"
                  "                    val id = (call.argument<Any>(\"id\") as? Number)?.toInt() ?: 0\n"
                  "                    TtsAlarmScheduler.cancel(applicationContext, id)\n"
                  "                    result.success(null)\n"
                  "                }\n"
                  "            }\n"
                  "        }\n"
                  "    }\n"
                  "}\n"
              )
              main_activity_content = re.sub(
                  r"class MainActivity\s*:\s*FlutterActivity\(\)\s*\n?",
                  new_class_body,
                  main_activity_content,
              )
              with open(main_activity, "w") as f:
                  f.write(main_activity_content)
              print("MainActivity.kt patched with tts_alarm channel")

          # 3) copy the widget layout + info XML into the res folders
          os.makedirs("android/app/src/main/res/layout", exist_ok=True)
          os.makedirs("android/app/src/main/res/xml", exist_ok=True)
          shutil.copy("native/widget/today_widget_layout.xml", "android/app/src/main/res/layout/today_widget_layout.xml")
          shutil.copy("native/widget/today_widget_info.xml", "android/app/src/main/res/xml/today_widget_info.xml")

          # 4) patch AndroidManifest.xml: add location + exact-alarm
          #    permissions, and the widget + TTS-alarm receiver declarations.
          manifest_path = "android/app/src/main/AndroidManifest.xml"
          manifest = open(manifest_path).read()

          permissions = (
              "    <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n"
              "    <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />\n"
              "    <uses-permission android:name=\"android.permission.SCHEDULE_EXACT_ALARM\" />\n"
              "    <uses-permission android:name=\"android.permission.RECEIVE_BOOT_COMPLETED\" />\n"
          )
          if "ACCESS_FINE_LOCATION" not in manifest:
              manifest = manifest.replace(
                  "<manifest ", "<manifest ", 1
              )
              # insert permissions right after the opening <manifest ...> tag
              idx = manifest.index(">", manifest.index("<manifest ")) + 1
              manifest = manifest[:idx] + "\n" + permissions + manifest[idx:]

          receiver_block = (
              "        <receiver android:name=\"" + pkg_name + ".TodayWidgetProvider\" android:exported=\"true\">\n"
              "            <intent-filter>\n"
              "                <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\" />\n"
              "            </intent-filter>\n"
              "            <meta-data android:name=\"android.appwidget.provider\"\n"
              "                android:resource=\"@xml/today_widget_info\" />\n"
              "        </receiver>\n"
          )
          if "TodayWidgetProvider" not in manifest:
              manifest = manifest.replace("</application>", receiver_block + "    </application>")

          tts_receiver_block = (
              "        <receiver android:name=\"" + pkg_name + ".TtsAlarmReceiver\" android:exported=\"false\" />\n"
          )
          if "TtsAlarmReceiver" not in manifest:
              manifest = manifest.replace("</application>", tts_receiver_block + "    </application>")

          tts_boot_receiver_block = (
              "        <receiver android:name=\"" + pkg_name + ".TtsAlarmBootReceiver\" android:exported=\"true\">\n"
              "            <intent-filter>\n"
              "                <action android:name=\"android.intent.action.BOOT_COMPLETED\" />\n"
              "                <action android:name=\"android.intent.action.QUICKBOOT_POWERON\" />\n"
              "                <action android:name=\"android.intent.action.MY_PACKAGE_REPLACED\" />\n"
              "            </intent-filter>\n"
              "        </receiver>\n"
          )
          if "TtsAlarmBootReceiver" not in manifest:
              manifest = manifest.replace("</application>", tts_boot_receiver_block + "    </application>")

          with open(manifest_path, "w") as f:
              f.write(manifest)
          print("manifest patched")
          '

      - name: Instaleaza dependintele
        run: flutter pub get

      - name: Forteaza compileSdk 36 in toate plugin-urile din pub cache (share_plus, home_widget etc)
        run: |
          python3 -c '
          import glob
          import os
          import re
          patched = []
          patterns = [
              os.path.expanduser("~/.pub-cache/hosted/*/*/android/build.gradle"),
              os.path.expanduser("~/.pub-cache/hosted/*/*/android/build.gradle.kts"),
          ]
          for pattern in patterns:
              for path in glob.glob(pattern):
                  with open(path) as f:
                      content = f.read()
                  new_content = content
                  new_content = re.sub(r"compileSdkVersion\s+\d+", "compileSdkVersion 36", new_content)
                  new_content = re.sub(r"compileSdk\s*=\s*\d+", "compileSdk = 36", new_content)
                  new_content = new_content.replace("flutter.compileSdkVersion", "36")
                  if new_content != content:
                      with open(path, "w") as f:
                          f.write(new_content)
                      patched.append(path)
          print("patched", len(patched), "plugin build files:")
          for p in patched:
              print(" -", p)
          '

      - name: Compileaza APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Incarca APK ca artifact
        uses: actions/upload-artifact@v4
        with:
          name: minime-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Creeaza un Release cu APK-ul atasat
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MiniMe build ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk

